name: job-scraper

on:
  schedule:
    - cron: "0 6,12,18,0 * * *"   # 4x daily UTC (~1a/7a/1p/7p ET)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-24.04    # pinned to avoid surprise bumps from ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade "pip==24.3.1"
          pip install -r requirements.txt

      - name: Run scraper
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_TO: ${{ secrets.NOTIFY_TO }}
        run: python -m scraper.main

      - name: Commit updated state
        run: |
          git config user.name  "job-scraper-bot"
          git config user.email "job-scraper-bot@users.noreply.github.com"
          git add seen_jobs.json
          git diff --cached --quiet || git commit -m "chore: update seen_jobs.json"
          git push
